# docker-compose.yml
version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE:      appdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout:  5s
      retries:  5

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "5000:5000"
    environment:
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: rootpass
      DB_NAME:     appdb
    depends_on:
      mysql:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: rootpass
      DB_NAME:     appdb
    depends_on:
      mysql:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3000:3000"
    environment:
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: rootpass
      DB_NAME:     appdb
    depends_on:
      mysql:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8081:8081"
    environment:
      USER_SERVICE_URL:         http://user-service:5000
      ORDER_SERVICE_URL:        http://order-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:3000
    depends_on:
      - user-service
      - order-service
      - notification-service

volumes:
  mysql-data: